<div class="row">
  @for (statusCard of statusCards; track $index) {
  <div class="col-xxxl-3 col-md-6">
    <rl-status-card [title]="statusCard.title" [type]="statusCard.type">
      <i [ngClass]="statusCard.iconClass"></i>
    </rl-status-card>
  </div>
  }
</div>

<div class="row">
  <div class="col-xxxl-3 col-xxl-4 col-lg-5 col-md-6">
    <rl-temperature></rl-temperature>
  </div>

  <div class="col-xxxl-9 col-xxl-8 col-lg-7 col-md-6">
    <rl-electricity></rl-electricity>
  </div>
</div>

<div class="row">
  <div class="col-xxxl-9 col-xl-12">
    <rl-rooms></rl-rooms>
  </div>

  <div class="col-xxxl-3 col-xxl-4 col-lg-7 col-md-6">
    <rl-contacts></rl-contacts>
  </div>

  <div class="col-xxxl-3 col-xxl-4 col-lg-5 col-md-6">
    <rl-solar [chartValue]="solarValue"></rl-solar>

    <rl-kitten></rl-kitten>
  </div>

  <div class="col-xxxl-3 col-xxl-4 col-md-5">
    <rl-traffic></rl-traffic>
    <rl-weather></rl-weather>
  </div>

  <div class="col-xxxl-6 col-xxl-12 col-md-7">
    <rl-security-cameras></rl-security-cameras>
  </div>
</div>
